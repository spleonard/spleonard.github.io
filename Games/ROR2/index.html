<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoR2 Item Cheat Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--bg2:#111420;--bg3:#181c2a;--bg4:#1e2235;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.16);
  --text:#e8eaf0;--muted:#7a8099;--accent:#c87941;
  --common:#c8c8c8;--uncommon:#4dcc6e;--legendary:#d14444;
  --boss:#d9c15e;--lunar:#5ba4d9;--void:#9b59d9;
  --equipment:#e07c2a;--elite-equip:#d95b8a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 18px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.05em;color:var(--accent);white-space:nowrap;}
.logo span{color:var(--text);}
.search-wrap{flex:1;min-width:140px;max-width:320px;}
#search{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 11px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
#search:focus{border-color:var(--accent);}
#search::placeholder{color:var(--muted);}
.stats{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap;}

/* filter rows */
.filter-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px;}
.filter-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-right:2px;white-space:nowrap;}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;user-select:none;letter-spacing:.02em;}
.pill:hover{border-color:rgba(255,255,255,.28);color:var(--text);}
.pill.active{background:transparent;color:#fff;border-color:currentColor;}
.pill.active.r-common    {color:var(--common);   border-color:var(--common);}
.pill.active.r-uncommon  {color:var(--uncommon); border-color:var(--uncommon);}
.pill.active.r-legendary {color:var(--legendary);border-color:var(--legendary);}
.pill.active.r-boss      {color:var(--boss);     border-color:var(--boss);}
.pill.active.r-lunar     {color:var(--lunar);    border-color:var(--lunar);}
.pill.active.r-void      {color:var(--void);     border-color:var(--void);}
.pill.active.r-equipment {color:var(--equipment);border-color:var(--equipment);}
.pill.active.r-elite-equip{color:var(--elite-equip);border-color:var(--elite-equip);}

.divider{width:1px;height:16px;background:var(--border2);margin:0 2px;flex-shrink:0;}

.dlc-toggle{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;user-select:none;}
.dlc-toggle:hover{border-color:rgba(255,255,255,.28);color:var(--text);}
.dlc-toggle.active.sotv{background:rgba(155,89,217,.14);border-color:var(--void);color:#b47de8;}
.dlc-toggle.active.sots{background:rgba(91,164,217,.14);border-color:var(--lunar);color:#7bbfe8;}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* category tag pills */
.cat-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;transition:all .12s;user-select:none;letter-spacing:.03em;text-transform:uppercase;}
.cat-pill:hover{border-color:rgba(255,255,255,.28);color:var(--text);}
.cat-pill.active{color:#fff;border-color:currentColor;}
.cat-pill.active[data-cat="health"]   {color:#e87070;border-color:#e87070;}
.cat-pill.active[data-cat="attack"]   {color:#e0a040;border-color:#e0a040;}
.cat-pill.active[data-cat="movement"] {color:#60d0a0;border-color:#60d0a0;}
.cat-pill.active[data-cat="aoe"]      {color:#e07048;border-color:#e07048;}
.cat-pill.active[data-cat="shields"]  {color:#70aadc;border-color:#70aadc;}
.cat-pill.active[data-cat="gold"]     {color:#d9c15e;border-color:#d9c15e;}
.cat-pill.active[data-cat="utility"]  {color:#a08ee0;border-color:#a08ee0;}
.cat-pill.active[data-cat="on-kill"]  {color:#e07070;border-color:#e07070;}
.cat-pill.active[data-cat="healing"]  {color:#78cc78;border-color:#78cc78;}
.cat-pill.active[data-cat="crit"]     {color:#f0c040;border-color:#f0c040;}
.cat-pill.active[data-cat="cooldown"] {color:#88c8e0;border-color:#88c8e0;}
.cat-pill.active[data-cat="void"]     {color:#9b59d9;border-color:#9b59d9;}

/* ── MAIN ── */
main{padding:18px;}
.section{margin-bottom:24px;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;}
.rarity-bar{height:2px;flex:1;border-radius:2px;opacity:.3;}
.section-count{font-size:11px;color:var(--muted);}

/* ── ITEM GRID ── */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:5px;}

.item-card{
  position:relative;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;
  transition:background .1s,border-color .1s,transform .1s;
  display:flex;align-items:flex-start;gap:10px;padding:8px 10px;
  overflow:hidden;
}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-1px);}
.item-card.pinned{outline:2px solid rgba(255,255,255,.55);outline-offset:1px;z-index:10;}

/* rarity stripe at left edge */
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px;}
.item-card[data-rarity="common"]    ::before{background:var(--common);}
.item-card[data-rarity="uncommon"]  ::before{background:var(--uncommon);}
.item-card[data-rarity="legendary"] ::before{background:var(--legendary);}
.item-card[data-rarity="boss"]      ::before{background:var(--boss);}
.item-card[data-rarity="lunar"]     ::before{background:var(--lunar);}
.item-card[data-rarity="void"]      ::before{background:var(--void);}
.item-card[data-rarity="equipment"] ::before{background:var(--equipment);}
.item-card[data-rarity="lunar-equip"]::before{background:var(--lunar);}
.item-card[data-rarity="elite-equip"]::before{background:var(--elite-equip);}

.dlc-badge{position:absolute;top:4px;right:4px;font-size:7px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:.05em;background:rgba(0,0,0,.55);}
.dlc-badge.sotv{color:#b47de8;}
.dlc-badge.sots{color:#7bbfe8;}

.item-img-wrap{width:40px;height:40px;border-radius:5px;overflow:hidden;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-left:2px;}
.item-img{width:40px;height:40px;object-fit:contain;display:block;}
.item-fallback{font-size:20px;line-height:1;}

.item-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.item-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-desc{font-size:10px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.item-cats{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;}
.item-cat-tag{font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:8px;letter-spacing:.03em;text-transform:uppercase;opacity:.85;}
.cat-health   {background:rgba(232,112,112,.18);color:#e87070;}
.cat-attack   {background:rgba(224,160,64,.18);color:#e0a040;}
.cat-movement {background:rgba(96,208,160,.18);color:#60d0a0;}
.cat-aoe      {background:rgba(224,112,72,.18);color:#e07048;}
.cat-shields  {background:rgba(112,170,220,.18);color:#70aadc;}
.cat-gold     {background:rgba(217,193,94,.18);color:#d9c15e;}
.cat-utility  {background:rgba(160,142,224,.18);color:#a08ee0;}
.cat-on-kill  {background:rgba(224,112,112,.18);color:#e07070;}
.cat-healing  {background:rgba(120,204,120,.18);color:#78cc78;}
.cat-crit     {background:rgba(240,192,64,.18);color:#f0c040;}
.cat-cooldown {background:rgba(136,200,224,.18);color:#88c8e0;}
.cat-void     {background:rgba(155,89,217,.18);color:#9b59d9;}

/* ── DETAIL PANEL ── */
.detail-panel{
  position:fixed;bottom:18px;right:18px;width:300px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:12px;padding:14px;z-index:300;
  pointer-events:none;opacity:0;transform:translateY(6px);
  transition:opacity .15s,transform .15s;
}
.detail-panel.visible{opacity:1;transform:translateY(0);pointer-events:auto;}
.detail-panel.pinned-panel{border-color:rgba(255,255,255,.28);}
.pin-hint{font-size:10px;color:var(--muted);text-align:right;margin-bottom:9px;}
.pin-hint.is-pinned{color:var(--accent);}
.detail-close{position:absolute;top:9px;right:11px;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;line-height:1;display:none;}
.detail-close:hover{color:var(--text);}
.detail-panel.pinned-panel .detail-close{display:block;}
.detail-top{display:flex;gap:11px;align-items:flex-start;margin-bottom:9px;}
.detail-img-wrap{width:54px;height:54px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;}
.detail-img{width:54px;height:54px;object-fit:contain;}
.detail-fallback{font-size:28px;}
.detail-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;line-height:1.2;margin-bottom:2px;}
.detail-rarity{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.detail-dlc-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;margin-top:3px;letter-spacing:.04em;}
.detail-dlc-badge.sotv{background:rgba(155,89,217,.2);color:#b47de8;}
.detail-dlc-badge.sots{background:rgba(91,164,217,.2);color:#7bbfe8;}
.detail-cats-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.detail-desc{font-size:12px;color:var(--text);line-height:1.55;border-top:1px solid var(--border);padding-top:8px;}
.detail-wiki{display:block;margin-top:9px;font-size:11px;color:var(--accent);font-weight:600;border-top:1px solid var(--border);padding-top:7px;text-decoration:none;}
.detail-wiki:hover{color:#e89c61;}

.no-results{text-align:center;padding:48px;color:var(--muted);font-size:15px;}
.t-common{color:var(--common);}.t-uncommon{color:var(--uncommon);}.t-legendary{color:var(--legendary);}.t-boss{color:var(--boss);}.t-lunar{color:var(--lunar);}.t-void{color:var(--void);}.t-equipment{color:var(--equipment);}.t-elite-equip{color:var(--elite-equip);}.t-lunar-equip{color:var(--lunar);}

@media(max-width:600px){
  main{padding:10px;}
  .item-grid{grid-template-columns:1fr;}
  .detail-panel{right:10px;bottom:10px;width:calc(100vw - 20px);}
}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">ROR2 <span>CHEAT SHEET</span></div>
    <div class="search-wrap"><input type="text" id="search" placeholder="Search items or descriptions..." autocomplete="off"></div>
    <div class="stats" id="stats-display">Loading...</div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Rarity</span>
    <div class="pill active r-common"     data-filter="common">Common</div>
    <div class="pill active r-uncommon"   data-filter="uncommon">Uncommon</div>
    <div class="pill active r-legendary"  data-filter="legendary">Legendary</div>
    <div class="pill active r-boss"       data-filter="boss">Boss</div>
    <div class="pill active r-lunar"      data-filter="lunar">Lunar</div>
    <div class="pill active r-void"       data-filter="void">Void</div>
    <div class="pill active r-equipment"  data-filter="equipment">Equipment</div>
    <div class="pill active r-elite-equip" data-filter="elite-equip">Elite Equip</div>
    <div class="divider"></div>
    <span class="filter-label">DLC</span>
    <div class="dlc-toggle active sotv" data-dlc="sotv"><div class="dot"></div>SotV</div>
    <div class="dlc-toggle active sots" data-dlc="sots"><div class="dot"></div>SotS</div>
  </div>
  <div class="filter-row" id="cat-filter-row">
    <span class="filter-label">Category</span>
    <div class="cat-pill" data-cat="health">Health</div>
    <div class="cat-pill" data-cat="attack">Attack</div>
    <div class="cat-pill" data-cat="crit">Crit</div>
    <div class="cat-pill" data-cat="aoe">AOE</div>
    <div class="cat-pill" data-cat="healing">Healing</div>
    <div class="cat-pill" data-cat="shields">Shields</div>
    <div class="cat-pill" data-cat="movement">Movement</div>
    <div class="cat-pill" data-cat="on-kill">On-Kill</div>
    <div class="cat-pill" data-cat="utility">Utility</div>
    <div class="cat-pill" data-cat="cooldown">Cooldown</div>
    <div class="cat-pill" data-cat="gold">Gold</div>
    <div class="cat-pill" data-cat="void">Void</div>
  </div>
</header>
<main id="main-content"></main>
<div class="detail-panel" id="detail-panel">
  <button class="detail-close" id="detail-close">✕</button>
  <div class="pin-hint" id="pin-hint">click item to pin</div>
  <div class="detail-top">
    <div class="detail-img-wrap">
      <img class="detail-img" id="d-img" src="" alt="" style="display:none" onerror="this.style.display='none';document.getElementById('d-fallback').style.display='block'">
      <span class="detail-fallback" id="d-fallback"></span>
    </div>
    <div>
      <div class="detail-name" id="d-name"></div>
      <div class="detail-rarity" id="d-rarity"></div>
      <div class="detail-dlc-badge" id="d-dlc" style="display:none"></div>
    </div>
  </div>
  <div class="detail-cats-row" id="d-cats"></div>
  <div class="detail-desc" id="d-desc"></div>
  <a class="detail-wiki" id="d-wiki" href="#" target="_blank">View on wiki.gg →</a>
</div>

{id:"molotov-6pack",name:"Molotov (6-Pack)",rarity:"equipment",dlc:"sotv",img:"Molotov_(6-Pack).png",emoji:"🍾",cats:["attack","aoe"],desc:"Throw 6 molotov cocktails that ignite enemies for 500% base damage. Each leaves a burning area for 200% damage/s. Cooldown: 45s.",wiki:"Molotov_(6-Pack)"},
// LUNAR EQUIPMENT
{id:"effigy-of-grief",name:"Effigy of Grief",rarity:"lunar-equip",dlc:null,img:"Effigy_of_Grief.png",emoji:"😞",cats:["utility"],desc:"ALL characters within are slowed by 50% and have armor reduced by 20. Can place up to 5. Consumed on use.",wiki:"Effigy_of_Grief"},
{id:"helfire-tincture",name:"Helfire Tincture",rarity:"lunar-equip",dlc:null,img:"Helfire_Tincture.png",emoji:"🔥",cats:["attack","aoe"],desc:"Ignite ALL characters within 15m for 12 seconds. Deals 5% max HP/s to yourself, 10% to allies, 300% to enemies. Cooldown: 45s.",wiki:"Helfire_Tincture"},
// ELITE EQUIPMENT
{id:"brainstalks",name:"Brainstalks",rarity:"elite-equip",dlc:null,img:"Brainstalks.png",emoji:"🧠",cats:["cooldown"],desc:"[Celestine Elite] Upon killing an elite monster, enter a frenzy for 4s where all skills have no cooldowns.",wiki:"Brainstalks"},
{id:"spectral-circlet",name:"Spectral Circlet",rarity:"elite-equip",dlc:null,img:"Spectral_Circlet.png",emoji:"👻",cats:["utility"],desc:"[Haunted Elite] Passively: the Celestine Elite's haunting aura that periodically cloaks all nearby enemies.",wiki:"Spectral_Circlet"},
];

const RARITIES=[
  {id:"common",label:"Common",color:"#c8c8c8"},
  {id:"uncommon",label:"Uncommon",color:"#4dcc6e"},
  {id:"legendary",label:"Legendary",color:"#d14444"},
  {id:"boss",label:"Boss",color:"#d9c15e"},
  {id:"lunar",label:"Lunar",color:"#5ba4d9"},
  {id:"void",label:"Void",color:"#9b59d9"},
  {id:"equipment",label:"Equipment",color:"#e07c2a"},
  {id:"lunar-equip",label:"Lunar Equipment",color:"#5ba4d9"},
  {id:"elite-equip",label:"Elite Equipment",color:"#d95b8a"},
];

const state={
  search:"",
  activeRarities:new Set(RARITIES.map(r=>r.id)),
  activeDlcs:new Set(["sotv","sots"]),
  activeCategories:new Set(),
  pinnedItem:null,pinnedCard:null
};

function wikiUrl(item){return`https://riskofrain2.wiki.gg/wiki/${item.wiki}`;}

function showDetail(item,pinned){
  const panel=document.getElementById("detail-panel");
  if(!item){panel.classList.remove("visible","pinned-panel");document.getElementById("pin-hint").textContent="click item to pin";document.getElementById("pin-hint").classList.remove("is-pinned");return;}
  const rarity=RARITIES.find(r=>r.id===item.rarity)||RARITIES[0];
  const imgEl=document.getElementById("d-img"),fb=document.getElementById("d-fallback");
  const url=IMGS[item.img];
  if(url){imgEl.src=url;imgEl.style.display="block";fb.style.display="none";}
  else{imgEl.style.display="none";fb.style.display="block";fb.textContent=item.emoji;}
  document.getElementById("d-name").textContent=item.name;
  const rarEl=document.getElementById("d-rarity");
  const rarLabel={"lunar-equip":"Lunar Equipment","elite-equip":"Elite Equipment","void":"Void Item","lunar":"Lunar Item"}[item.rarity]||(item.rarity.charAt(0).toUpperCase()+item.rarity.slice(1));
  rarEl.textContent=rarLabel;rarEl.style.color=rarity.color;
  const dlcEl=document.getElementById("d-dlc");
  if(item.dlc){dlcEl.style.display="inline-block";dlcEl.textContent=item.dlc==="sotv"?"Survivors of the Void":"Seekers of the Storm";dlcEl.className="detail-dlc-badge "+item.dlc;}
  else{dlcEl.style.display="none";}
  const catsRow=document.getElementById("d-cats");
  catsRow.innerHTML=(item.cats||[]).map(c=>`<span class="item-cat-tag cat-${c}">${c}</span>`).join("");
  document.getElementById("d-desc").textContent=item.desc;
  document.getElementById("d-wiki").href=wikiUrl(item);
  const hint=document.getElementById("pin-hint");
  if(pinned){panel.classList.add("pinned-panel");hint.textContent="pinned — click ✕ to close";hint.classList.add("is-pinned");}
  else{panel.classList.remove("pinned-panel");hint.textContent="click item to pin";hint.classList.remove("is-pinned");}
  panel.classList.add("visible");
}

function unpin(){if(state.pinnedCard){state.pinnedCard.classList.remove("pinned");state.pinnedCard=null;}state.pinnedItem=null;}

function itemMatches(item){
  if(!state.activeRarities.has(item.rarity))return false;
  if(item.dlc&&!state.activeDlcs.has(item.dlc))return false;
  if(state.activeCategories.size>0&&!(item.cats||[]).some(c=>state.activeCategories.has(c)))return false;
  if(state.search){
    const s=state.search.toLowerCase();
    if(!item.name.toLowerCase().includes(s)&&!item.desc.toLowerCase().includes(s))return false;
  }
  return true;
}

function buildGrid(){
  const main=document.getElementById("main-content");
  main.innerHTML="";
  let total=0;
  for(const rarity of RARITIES){
    if(!state.activeRarities.has(rarity.id))continue;
    const items=ITEMS.filter(item=>item.rarity===rarity.id&&itemMatches(item));
    if(!items.length)continue;
    total+=items.length;
    const sec=document.createElement("div");sec.className="section";
    sec.innerHTML=`<div class="section-header"><span class="section-title t-${rarity.id}">${rarity.label}</span><div class="rarity-bar" style="background:${rarity.color}"></div><span class="section-count">${items.length}</span></div><div class="item-grid" id="grid-${rarity.id}"></div>`;
    main.appendChild(sec);
    const grid=sec.querySelector(".item-grid");
    for(const item of items){
      const card=document.createElement("div");
      card.className="item-card";card.dataset.rarity=item.rarity;
      const url=IMGS[item.img];
      const imgTag=url?`<img class="item-img" src="${url}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`:"";
      const catTags=(item.cats||[]).map(c=>`<span class="item-cat-tag cat-${c}">${c}</span>`).join("");
      card.innerHTML=`
        ${item.dlc?`<span class="dlc-badge ${item.dlc}">${item.dlc==="sotv"?"SotV":"SotS"}</span>`:""}
        <div class="item-img-wrap">${imgTag}<span class="item-fallback"${url?' style="display:none"':''}>${item.emoji}</span></div>
        <div class="item-text">
          <div class="item-name" title="${item.name}">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-cats">${catTags}</div>
        </div>`;
      card.addEventListener("mouseenter",()=>{if(!state.pinnedItem)showDetail(item,false);});
      card.addEventListener("mouseleave",()=>{if(!state.pinnedItem)showDetail(null,false);});
      card.addEventListener("click",(e)=>{
        e.stopPropagation();
        if(state.pinnedItem===item){unpin();showDetail(null,false);}
        else{unpin();state.pinnedItem=item;state.pinnedCard=card;card.classList.add("pinned");showDetail(item,true);}
      });
      grid.appendChild(card);
    }
  }
  if(!total)main.innerHTML=`<div class="no-results">No items match your filters.</div>`;
  const all=ITEMS.filter(itemMatches).length;
  document.getElementById("stats-display").textContent=`${total} items`;
}

// Rarity pills
document.querySelectorAll(".pill[data-filter]").forEach(p=>{
  p.addEventListener("click",()=>{
    const f=p.dataset.filter;
    if(state.activeRarities.has(f)){state.activeRarities.delete(f);p.classList.remove("active");}
    else{state.activeRarities.add(f);p.classList.add("active");}
    buildGrid();
  });
});

// DLC toggles
document.querySelectorAll(".dlc-toggle[data-dlc]").forEach(t=>{
  t.addEventListener("click",()=>{
    const d=t.dataset.dlc;
    if(state.activeDlcs.has(d)){state.activeDlcs.delete(d);t.classList.remove("active");}
    else{state.activeDlcs.add(d);t.classList.add("active");}
    buildGrid();
  });
});

// Category pills
document.querySelectorAll(".cat-pill[data-cat]").forEach(p=>{
  p.addEventListener("click",()=>{
    const c=p.dataset.cat;
    if(state.activeCategories.has(c)){state.activeCategories.delete(c);p.classList.remove("active");}
    else{state.activeCategories.add(c);p.classList.add("active");}
    buildGrid();
  });
});

// Search
document.getElementById("search").addEventListener("input",e=>{state.search=e.target.value;buildGrid();});

// Close / unpin
document.getElementById("detail-close").addEventListener("click",()=>{unpin();showDetail(null,false);});
document.addEventListener("click",(e)=>{
  const panel=document.getElementById("detail-panel");
  if(state.pinnedItem&&!panel.contains(e.target)&&!e.target.closest(".item-card")){unpin();showDetail(null,false);}
});

buildGrid();
</script>
</body>
</html>
