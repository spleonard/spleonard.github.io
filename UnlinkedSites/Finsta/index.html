/* Billabong — the actual Instagram wordmark font */
@font-face {
  font-family: 'Billabong';
  src: url('https://db.onlinewebfonts.com/t/cfe1f1f1ff98e1e33adc3c2e1f91b201.woff2') format('woff2'),
       url('https://db.onlinewebfonts.com/t/cfe1f1f1ff98e1e33adc3c2e1f91b201.woff') format('woff');
  font-weight: normal;
}

:root {
  --ig-blue: #0095f6;
  --ig-border: #dbdbdb;
  --ig-text: #262626;
  --ig-secondary: #8e8e8e;
  --ig-white: #ffffff;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--ig-white);
  color: var(--ig-text);
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; height: 44px;
  background: var(--ig-white); border-bottom: 1px solid var(--ig-border);
  position: sticky; top: 0; z-index: 100;
}
.logo {
  font-family: 'Billabong', 'Dancing Script', cursive;
  font-size: 28px; font-weight: normal;
  color: var(--ig-text); line-height: 1;
  /* fallback if font doesn't load */
}
.top-icons { display: flex; gap: 4px; align-items: center; }
.icon-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; }

/* ── SKELETON ── */
#skeleton { background: var(--ig-white); padding-bottom: 80px; }
.sk-post { border-bottom: 1px solid var(--ig-border); }
.sk-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.sk-meta { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
.shimmer {
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 3px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── ERROR STATE ── */
#error-state {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  min-height: calc(100dvh - 104px);
  padding: 32px 52px; text-align: center; background: var(--ig-white);
}
#error-state.show { display: flex; animation: fadeUp 0.35s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

.error-icon { width: 80px; height: 80px; margin-bottom: 20px; }
.error-title { font-size: 17px; font-weight: 600; color: var(--ig-text); margin-bottom: 10px; letter-spacing: -0.1px; }
.error-body { font-size: 13px; color: var(--ig-secondary); line-height: 1.65; margin-bottom: 20px; }
.error-retry {
  background: none; border: none; color: var(--ig-blue);
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; padding: 6px 10px;
  border-radius: 6px;
}
.error-retry:active { opacity: 0.5; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--ig-white); border-top: 1px solid var(--ig-border);
  display: flex; justify-content: space-around; align-items: center;
  padding: 6px 0 calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  width: 48px; height: 40px;
}
/* active home icon fill */
.nav-home-active { fill: #262626; }

.profile-thumb {
  width: 27px; height: 27px; border-radius: 50%;
  background: #dbdbdb; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

<script>
  function showError() {
    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('error-state').classList.add('show');
  }
  function retryPrank() {
    const err = document.getElementById('error-state');
    const sk  = document.getElementById('skeleton');
    err.classList.remove('show');
    err.style.display = 'none';
    sk.style.display = 'block';
    setTimeout(showError, 2500);
  }
  setTimeout(showError, 3000);
</script>
