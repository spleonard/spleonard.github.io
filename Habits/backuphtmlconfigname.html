<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --shadow: 6px 6px 20px rgba(145,192,255,0.4), inset -3px -3px 8px rgba(145,192,255,0.2), inset 0 5px 14px rgba(255,255,255,0.95);
    --shadow-sm: 4px 4px 12px rgba(145,192,255,0.35), inset -2px -2px 6px rgba(145,192,255,0.2), inset 0 3px 8px rgba(255,255,255,0.9);
    --shadow-press: 2px 2px 5px rgba(145,192,255,0.35), inset 3px 3px 7px rgba(145,192,255,0.3), inset 0 -2px 5px rgba(255,255,255,0.65);
    --green: #58cc02;
    --green-bg: #d7f5b0;
    --green-shadow: 5px 5px 16px rgba(88,204,2,0.3), inset -3px -3px 7px rgba(88,204,2,0.18), inset 0 4px 10px rgba(255,255,255,0.75);
    --p: #a78bfa;
    --o: #fb923c;
    --b: #38bdf8;
    --text: #1e293b;
    --muted: #94a3b8;
    --r: 22px;
    --rl: 28px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 100vw;
    padding-bottom: 40px;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--card);
    box-shadow: var(--shadow-sm);
    border-radius: 0 0 var(--rl) var(--rl);
    padding: 18px 18px 14px;
    position: sticky; top: 0; z-index: 100;
    width: 100%; max-width: 100vw; overflow: hidden;
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; width: 100%; min-width: 0;
  }
  .header-left { display: flex; align-items: center; gap: 8px; min-width: 0; flex-shrink: 1; }
  .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .gear-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--bg); box-shadow: var(--shadow-sm);
    border: none; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s; flex-shrink: 0;
  }
  .gear-btn:active { transform: scale(0.88) rotate(30deg); }

  .app-title {
    font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--p), var(--b));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
  }

  .today-btn {
    padding: 7px 10px; border-radius: 50px;
    background: var(--bg); box-shadow: var(--shadow-sm);
    border: none; font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 800; color: var(--p);
    cursor: pointer; transition: transform 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .today-btn:active { transform: scale(0.91); }

  .streak-pill {
    display: flex; align-items: center; gap: 5px;
    background: linear-gradient(135deg, #d4f5a0, #a8f0c6);
    box-shadow: 4px 4px 12px rgba(88,204,2,0.28), inset -2px -2px 6px rgba(88,204,2,0.15), inset 0 3px 8px rgba(255,255,255,0.85);
    border-radius: 50px; padding: 7px 11px;
    font-weight: 800; font-size: 13px; color: #2a7a00; white-space: nowrap;
  }
  .flame { font-size: 17px; animation: flicker 1.5s ease-in-out infinite alternate; }
  @keyframes flicker { from { transform: scale(1) rotate(-3deg); } to { transform: scale(1.15) rotate(3deg); } }

  /* SECTION LABEL */
  .section-label {
    font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--muted); margin: 16px 18px 7px;
  }

  /* MINI CALENDAR — horizontally scrollable, 60 days, today is rightmost */
  .mini-calendar {
    display: flex; gap: 9px;
    padding: 4px 18px 6px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .mini-calendar::-webkit-scrollbar { display: none; }

  .day-card {
    flex: 0 0 86px;
    scroll-snap-align: end;
    background: var(--card);
    border-radius: var(--r);
    box-shadow: var(--shadow-sm);
    padding: 11px 7px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .day-card:active { transform: scale(0.94); box-shadow: var(--shadow-press); }
  .day-card.is-today { background: linear-gradient(160deg,#eef4ff,#f0f4ff); }
  .day-card.selected { outline: 3px solid var(--p); outline-offset: -3px; }

  .day-name { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }
  .day-num  { font-size: 21px; font-weight: 900; line-height: 1.1; margin: 2px 0; }
  .day-bar  { margin-top: 7px; height: 5px; border-radius: 99px; background: #e2e8f0; overflow: hidden; }
  .day-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,var(--green),#a3e635); transition: width 0.4s cubic-bezier(.34,1.56,.64,1); }
  .day-dots { display: flex; justify-content: center; gap: 4px; margin-top: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #e2e8f0; transition: background 0.3s; }
  .dot.done { background: var(--green); }

  /* EXPAND TOGGLE */
  .expand-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin: 9px 18px 0; padding: 9px;
    background: var(--card); border-radius: var(--r);
    box-shadow: var(--shadow-sm); cursor: pointer;
    font-size: 12px; font-weight: 800; color: var(--muted);
    border: none; width: calc(100% - 36px); transition: transform 0.15s;
  }
  .expand-btn:active { transform: scale(0.98); }
  .chevron { transition: transform 0.3s; font-size: 13px; }
  .expand-btn.open .chevron { transform: rotate(180deg); }

  /* FULL 4-WEEK GRID */
  .full-cal { display: none; padding: 10px 18px 0; }
  .full-cal.open { display: block; }
  .week-hdr { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-bottom: 5px; }
  .whcell { text-align: center; font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; padding: 3px 0; }
  .month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
  .gcell {
    aspect-ratio: 1; border-radius: 12px;
    background: var(--card);
    box-shadow: 3px 3px 9px rgba(145,192,255,0.32), inset 0 2px 6px rgba(255,255,255,0.88);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.12s;
    position: relative; overflow: hidden;
  }
  .gcell:active { transform: scale(0.9); }
  .gcell.future { opacity: 0.25; pointer-events: none; }
  .gcell.empty  { background: transparent; box-shadow: none; pointer-events: none; }
  .gcell.today-g { outline: 2.5px solid var(--p); outline-offset: -2px; }
  .gcell.sel-g   { outline: 2.5px solid var(--b); outline-offset: -2px; }
  .gcell-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(0deg,rgba(88,204,2,0.24),rgba(163,230,53,0.06)); transition: height 0.35s cubic-bezier(.34,1.56,.64,1); }
  .gcell-num  { font-size: 11px; font-weight: 800; position: relative; z-index: 1; }

  /* DAY PANEL */
  .day-panel {
    margin: 13px 18px 0;
    background: var(--card);
    border-radius: var(--rl);
    box-shadow: var(--shadow);
    padding: 18px;
    animation: slideUp 0.28s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .panel-date { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 13px; }

  .habit-btn {
    display: flex; align-items: center; gap: 11px;
    background: #f8faff; border: none; border-radius: 16px;
    box-shadow: var(--shadow-sm);
    padding: 13px 14px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    text-align: left; width: 100%; margin-bottom: 9px;
  }
  .habit-btn:last-child { margin-bottom: 0; }
  .habit-btn:active { transform: scale(0.97); box-shadow: var(--shadow-press); }
  .habit-btn.done { background: var(--green-bg); box-shadow: var(--green-shadow); }

  .hicon {
    width: 36px; height: 36px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .habit-btn.done .hicon { transform: scale(1.15) rotate(6deg); }
  .hlabel { font-size: 15px; font-weight: 800; color: var(--text); flex: 1; }
  .hcheck {
    width: 25px; height: 25px; border-radius: 50%;
    border: 2.5px solid #cbd5e1;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900;
    transition: all 0.22s; flex-shrink: 0; color: transparent;
  }
  .habit-btn.done .hcheck { background: var(--green); border-color: var(--green); color: #fff; }

  /* STREAK SECTION */
  .streak-section {
    margin: 13px 18px 0;
    background: var(--card);
    border-radius: var(--rl);
    box-shadow: var(--shadow);
    padding: 18px;
  }
  .streak-title { font-size: 13px; font-weight: 800; margin-bottom: 12px; }
  .streak-bar { display: flex; gap: 5px; flex-wrap: wrap; }
  .sdot {
    width: 27px; height: 27px; border-radius: 8px;
    background: #e2e8f0;
    box-shadow: 2px 2px 6px rgba(145,192,255,0.28), inset 0 2px 4px rgba(255,255,255,0.8);
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .sdot.full    { background: linear-gradient(135deg,#fbbf24,#f97316); box-shadow: 3px 3px 9px rgba(251,191,36,0.4), inset 0 2px 4px rgba(255,255,255,0.45); }
  .sdot.partial { background: linear-gradient(135deg,#a78bfa,#818cf8); box-shadow: 3px 3px 9px rgba(167,139,250,0.4), inset 0 2px 4px rgba(255,255,255,0.45); }
  .streak-legend { display: flex; gap: 12px; margin-top: 10px; font-size: 11px; font-weight: 700; color: var(--muted); }
  .lswatch { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }

  /* SETTINGS OVERLAY */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(30,41,59,0.32);
    backdrop-filter: blur(5px);
    z-index: 300; align-items: flex-end;
  }
  .overlay.open { display: flex; animation: fadeIn 0.18s; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .sheet {
    background: var(--card);
    border-radius: var(--rl) var(--rl) 0 0;
    box-shadow: 0 -6px 36px rgba(145,192,255,0.38), inset 0 3px 14px rgba(255,255,255,0.9);
    padding: 22px 22px 52px; width: 100%;
    animation: sheetUp 0.32s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes sheetUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .handle { width: 38px; height: 4px; border-radius: 99px; background: #e2e8f0; margin: 0 auto 18px; }
  .sheet-title { font-size: 19px; font-weight: 900; margin-bottom: 18px; }

  .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .input-row   { display: flex; align-items: center; gap: 9px; }
  .emoji-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--bg); box-shadow: var(--shadow-sm);
    border: none; font-size: 20px; cursor: pointer; flex-shrink: 0;
    transition: transform 0.15s;
  }
  .emoji-btn:active { transform: scale(0.88); }
  .name-input {
    flex: 1; padding: 11px 14px;
    border-radius: 13px; border: none;
    background: var(--bg); box-shadow: var(--shadow-sm);
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: var(--text);
    outline: none;
  }
  .name-input:focus { box-shadow: var(--shadow-sm), 0 0 0 3px rgba(167,139,250,0.28); }

  .epicker {
    display: none; flex-wrap: wrap; gap: 7px;
    background: var(--bg); border-radius: 14px;
    box-shadow: var(--shadow-sm);
    padding: 11px; margin-bottom: 12px;
  }
  .epicker.open { display: flex; }
  .eopt { font-size: 22px; cursor: pointer; padding: 4px; border-radius: 8px; border: none; background: none; transition: transform 0.12s; }
  .eopt:active { transform: scale(1.3); }

  .save-btn {
    width: 100%; padding: 15px; border-radius: var(--r); border: none;
    background: linear-gradient(135deg,var(--p),var(--b));
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 900; cursor: pointer;
    box-shadow: 5px 5px 18px rgba(167,139,250,0.42), inset 0 3px 8px rgba(255,255,255,0.18);
    transition: transform 0.15s;
  }
  .save-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div class="header-left">
      <button class="gear-btn" onclick="openSettings()">⚙️</button>
      <div class="app-title">Habits</div>
    </div>
    <div class="header-right">
      <button class="today-btn" onclick="goToToday()">↩ Today</button>
      <div class="streak-pill">
        <span class="flame">🔥</span>
        <span id="streak-count">0 days</span>
      </div>
    </div>
  </div>
</div>

<!-- MINI CALENDAR -->
<div class="section-label">Days</div>
<div class="mini-calendar" id="mini-cal"></div>

<!-- EXPAND BUTTON -->
<button class="expand-btn" id="expand-btn" onclick="toggleFullCal()">
  <span id="expand-label">View 4 Weeks</span>
  <span class="chevron">▼</span>
</button>

<!-- FULL CALENDAR -->
<div class="full-cal" id="full-cal">
  <div class="week-hdr" id="week-hdr"></div>
  <div class="month-grid" id="month-grid"></div>
</div>

<!-- DAY PANEL -->
<div class="day-panel" id="day-panel">
  <div class="panel-date" id="panel-date"></div>
  <div id="habit-btns"></div>
</div>

<!-- STREAK -->
<div class="streak-section">
  <div class="streak-title">🔥 Last 14 Days</div>
  <div class="streak-bar" id="streak-bar"></div>
  <div class="streak-legend">
    <span><span class="lswatch" style="background:linear-gradient(135deg,#fbbf24,#f97316)"></span>All done</span>
    <span><span class="lswatch" style="background:linear-gradient(135deg,#a78bfa,#818cf8)"></span>Partial</span>
    <span><span class="lswatch" style="background:#e2e8f0"></span>None</span>
  </div>
</div>

<!-- SETTINGS -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Your Habits</div>
    <div class="input-group" id="input-group"></div>
    <div class="epicker" id="epicker"></div>
    <button class="save-btn" onclick="saveSettings()">Save ✓</button>
  </div>
</div>

<script>
const EMOJIS = ['💪','🧘','📚','🛁','💧','🏃','🛌','✍️','🪥','🎨','🧠','🌿','🎵','❤️','🏋️','🌅','🍎','🧹','☕','🧴','🦷','🐾','🎮','🌊'];
const ICON_BG = ['#ede9fe','#fff7ed','#e0f2fe'];
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let activeEmojiTarget = null;

// ── STORAGE (localStorage — works in Safari saved files) ──
function loadHabits() {
  try {
    const s = localStorage.getItem('hbt_habits');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return [
    { label:'Habit 1', emoji:'💪' },
    { label:'Habit 2', emoji:'🧘' },
    { label:'Habit 3', emoji:'📚' }
  ];
}
function saveHabits(h) {
  try { localStorage.setItem('hbt_habits', JSON.stringify(h)); } catch(e) {}
}
function loadLog() {
  try { const s = localStorage.getItem('hbt_log'); return s ? JSON.parse(s) : {}; }
  catch(e) { return {}; }
}
function saveLog(l) {
  try { localStorage.setItem('hbt_log', JSON.stringify(l)); } catch(e) {}
}

// ── DATE HELPERS ──
function dk(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(base, n) {
  const d = new Date(base.getTime());
  d.setDate(d.getDate() + n);
  return d;
}
function todayKey() { return dk(new Date()); }

function friendlyLabel(k) {
  const td = todayKey();
  const yd = dk(addDays(new Date(), -1));
  if (k === td) return 'Today';
  if (k === yd) return 'Yesterday';
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
}

// ── STATE ──
let selectedKey = todayKey();

// ── MINI CALENDAR ──
function renderMiniCal(scrollToKey) {
  const log = loadLog();
  const mc = document.getElementById('mini-cal');
  mc.innerHTML = '';
  const today = new Date();

  // Render 60 days: index 59=oldest, 0=today
  for (let i = 59; i >= 0; i--) {
    const d = addDays(today, -i);
    const k = dk(d);
    const entry = log[k] || [0,0,0];
    const count = entry.filter(Boolean).length;
    const pct = Math.round((count/3)*100);

    const card = document.createElement('div');
    card.className = 'day-card' + (i===0?' is-today':'') + (k===selectedKey?' selected':'');
    card.id = 'mc-'+k;
    card.innerHTML =
      '<div class="day-name">'+DOW[d.getDay()]+'</div>'+
      '<div class="day-num">'+d.getDate()+'</div>'+
      '<div class="day-bar"><div class="day-bar-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="day-dots">'+
        entry.map(v=>'<div class="dot'+(v?' done':'')+'"></div>').join('')+
      '</div>';
    card.addEventListener('click', function(){ selectedKey = k; renderAll(true); });
    mc.appendChild(card);
  }

  // Scroll: if scrollToKey provided, scroll to that card; otherwise scroll to today (rightmost)
  requestAnimationFrame(function() {
    const target = document.getElementById('mc-'+(scrollToKey||todayKey()));
    if (target) {
      mc.scrollLeft = target.offsetLeft - mc.clientWidth + target.offsetWidth + 18;
    }
  });
}

// ── FULL CALENDAR ──
function renderFullCal() {
  const log = loadLog();
  const today = new Date();
  const todayK = todayKey();

  document.getElementById('week-hdr').innerHTML =
    DOW.map(d=>'<div class="whcell">'+d+'</div>').join('');

  // Start 27 days back, aligned to Sunday
  const rangeStart = addDays(today, -27);
  const startOffset = rangeStart.getDay();
  const gridStart = addDays(rangeStart, -startOffset);

  const grid = document.getElementById('month-grid');
  grid.innerHTML = '';

  for (let i = 0; i < 35; i++) {
    const cur = addDays(gridStart, i);
    const k = dk(cur);
    const beforeRange = cur < rangeStart;
    const afterToday  = cur > today;

    const cell = document.createElement('div');

    if (beforeRange) {
      cell.className = 'gcell empty';
    } else if (afterToday) {
      cell.className = 'gcell future';
      cell.innerHTML = '<div class="gcell-fill" style="height:0%"></div><div class="gcell-num">'+cur.getDate()+'</div>';
    } else {
      const entry = log[k] || [0,0,0];
      const pct = Math.round((entry.filter(Boolean).length/3)*100);
      cell.className = 'gcell'+(k===todayK?' today-g':'')+(k===selectedKey?' sel-g':'');
      cell.innerHTML = '<div class="gcell-fill" style="height:'+pct+'%"></div><div class="gcell-num">'+cur.getDate()+'</div>';
      cell.addEventListener('click', (function(key){
        return function() { selectedKey = key; renderAll(true); };
      })(k));
    }
    grid.appendChild(cell);
  }
}

// ── DAY PANEL ──
function renderDayPanel() {
  const log = loadLog();
  const habits = loadHabits();
  // Ensure entry is always a proper 3-element array
  let entry = log[selectedKey];
  if (!Array.isArray(entry) || entry.length < 3) entry = [0,0,0];

  document.getElementById('panel-date').textContent = friendlyLabel(selectedKey);

  const container = document.getElementById('habit-btns');
  container.innerHTML = '';

  habits.forEach(function(h, i) {
    const isDone = !!entry[i];
    const btn = document.createElement('button');
    btn.className = 'habit-btn' + (isDone ? ' done' : '');
    btn.innerHTML =
      '<div class="hicon" style="background:'+ICON_BG[i]+'">'+h.emoji+'</div>'+
      '<span class="hlabel">'+h.label+'</span>'+
      '<div class="hcheck">'+(isDone?'✓':'')+'</div>';

    btn.addEventListener('click', (function(idx){
      return function() {
        const l = loadLog();
        if (!Array.isArray(l[selectedKey]) || l[selectedKey].length < 3) {
          l[selectedKey] = [0,0,0];
        }
        l[selectedKey][idx] = l[selectedKey][idx] ? 0 : 1;
        saveLog(l);
        renderAll(false);
      };
    })(i));

    container.appendChild(btn);
  });
}

// ── STREAK ──
function renderStreak() {
  const log = loadLog();
  const today = new Date();
  const todayK = todayKey();

  // Count streak from today or yesterday back
  function countStreak(startOffset) {
    let n = 0;
    for (let i = startOffset; i < 365; i++) {
      const k = dk(addDays(today, -i));
      if ((log[k]||[0,0,0]).filter(Boolean).length === 3) n++;
      else break;
    }
    return n;
  }
  const todayDone = (log[todayK]||[0,0,0]).filter(Boolean).length === 3;
  const streak = todayDone ? countStreak(0) : countStreak(1);
  document.getElementById('streak-count').textContent = streak + (streak===1?' day':' days');

  const bar = document.getElementById('streak-bar');
  bar.innerHTML = '';
  for (let i = 13; i >= 0; i--) {
    const k = dk(addDays(today, -i));
    const count = (log[k]||[0,0,0]).filter(Boolean).length;
    const dot = document.createElement('div');
    dot.className = 'sdot' + (count===3?' full':count>0?' partial':'');
    bar.appendChild(dot);
  }
}

// ── RENDER ALL ──
function renderAll(scrollToSelected) {
  renderMiniCal(scrollToSelected ? selectedKey : null);
  if (document.getElementById('full-cal').classList.contains('open')) renderFullCal();
  renderDayPanel();
  renderStreak();
}

// ── TODAY BUTTON ──
function goToToday() {
  selectedKey = todayKey();
  renderAll(false); // null = scroll to today
}

// ── EXPAND TOGGLE ──
function toggleFullCal() {
  const fc = document.getElementById('full-cal');
  const btn = document.getElementById('expand-btn');
  fc.classList.toggle('open');
  btn.classList.toggle('open');
  document.getElementById('expand-label').textContent =
    fc.classList.contains('open') ? 'Hide Calendar' : 'View 4 Weeks';
  if (fc.classList.contains('open')) renderFullCal();
}

// ── SETTINGS ──
function openSettings() {
  const habits = loadHabits();
  const grp = document.getElementById('input-group');
  grp.innerHTML = '';
  habits.forEach(function(h, i) {
    const row = document.createElement('div');
    row.className = 'input-row';
    const eb = document.createElement('button');
    eb.className = 'emoji-btn';
    eb.id = 'ebtn-'+i;
    eb.textContent = h.emoji;
    eb.addEventListener('click', (function(idx){ return function(){ openEmoji(idx); }; })(i));
    const inp = document.createElement('input');
    inp.className = 'name-input';
    inp.id = 'ninput-'+i;
    inp.value = h.label;
    inp.placeholder = 'Habit '+(i+1);
    inp.maxLength = 26;
    row.appendChild(eb);
    row.appendChild(inp);
    grp.appendChild(row);
  });

  const picker = document.getElementById('epicker');
  picker.innerHTML = EMOJIS.map(function(e){
    return '<button class="eopt" onclick="pickEmoji(\''+e+'\')">'+e+'</button>';
  }).join('');

  document.getElementById('overlay').classList.add('open');
}

function openEmoji(i) {
  activeEmojiTarget = i;
  document.getElementById('epicker').classList.add('open');
}

function pickEmoji(e) {
  if (activeEmojiTarget !== null) {
    document.getElementById('ebtn-'+activeEmojiTarget).textContent = e;
    document.getElementById('epicker').classList.remove('open');
    activeEmojiTarget = null;
  }
}

function saveSettings() {
  const habits = loadHabits();
  const updated = habits.map(function(h, i) {
    return {
      label: (document.getElementById('ninput-'+i).value || 'Habit '+(i+1)).trim(),
      emoji: document.getElementById('ebtn-'+i).textContent.trim()
    };
  });
  saveHabits(updated);
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('epicker').classList.remove('open');
  activeEmojiTarget = null;
  renderAll(false);
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('epicker').classList.remove('open');
    activeEmojiTarget = null;
  }
}

// ── INIT ──
renderAll(false);
</script>
